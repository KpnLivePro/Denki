name: Build and deploy Python app to Azure Web App - Denkimon

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Recommended version for stability

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
                
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: . 

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'Denkimon'
          slot-name: 'Production'
          # Replace the line below with your actual secret name from GitHub Settings
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_01DAFFA6772F4410A07E8D4687587BFB }}
          package: .
