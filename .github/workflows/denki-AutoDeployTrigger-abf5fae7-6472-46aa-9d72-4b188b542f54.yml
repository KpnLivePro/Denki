name: Trigger auto deployment for denki

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/denki-AutoDeployTrigger-abf5fae7-6472-46aa-9d72-4b188b542f54.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DENKI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DENKI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DENKI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: kpnworldcloud.azurecr.io
          registryUsername: ${{ secrets.DENKI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DENKI_REGISTRY_PASSWORD }}
          containerAppName: denki
          resourceGroup: jeremiah-rg
          imageToBuild: kpnworldcloud.azurecr.io/denki:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


